<main>
<h1 class="text-center nli">Character Sheet</h1>

<form class="container mt-4">

    <!-- INFORMAÇÕES BÁSICAS -->
    <fieldset class="mb-4">
        <legend class="title">Basic Information</legend>

        <div class="info-flex">

            <!-- ESQUERDA -->
            <div class="info-left infos">
                <label>Character Name</label>
                <input type="text" required>

                <label>Species</label>
                <input type="text" required>

                <label>Class</label>
                <input type="text" required>
            </div>

            <!-- DIREITA -->
            <div class="foto-container">
                <label class="lab">Character Photo</label>

                <div class="foto-preview">
                    <span>Image</span>
                </div>

                <input type="file" accept="image/*">
    
            </div>

        </div>
    </fieldset>
    <hr style="border: none; height: 2px; background-color: black; width: 85%; opacity: 30%; margin-left: 7.5%;">
    <!-- ATRIBUTOS -->
    <fieldset class="mb-4">
      <div class="atributos">
        <legend class="title">Attributes</legend>
        <br>

            <label>Strength</label>
            <input type="number" min="1" max="5" required>

            <label>Dexterity</label>
            <input type="number" min="1" max="5" required>

            <label>Constitution</label>
            <input type="number" min="1" max="5" required>

            <label>Intelligence</label>
            <input type="number" min="1" max="5" required>

            <label>Wisdom</label>
            <input type="number" min="1" max="5" required>

            <label>Charisma</label>
            <input type="number" min="1" max="5" required>
        </div>
    </fieldset>

    <div class="text-center">
        <button id="sub" type="submit" class="btn-primary save">
            Save Character
        </button>
    </div>

</form>
</main>
